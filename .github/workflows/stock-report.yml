name: Stock Report

# Generates the daily reports on GitHub's runners (full internet + the FMP
# key from secrets), fires a phone alert on ACTION, and commits the report so a
# phone Claude session can read it without needing FMP access.
#
# SCHEDULING: the punctual 3x/day cadence is driven EXTERNALLY by cron-job.org,
# which fires this workflow via the workflow_dispatch REST API (mode passed in
# the request body). See docs/cron-job-setup.md. GitHub's own cron is best-effort
# and fires minutes-to-hours late, so the single `schedule:` entry below is kept
# ONLY as a once-daily safety-net (in case cron-job.org or its token is down).
# NOTE: each run scans ~217 names against FMP — don't add duplicate schedules.

on:
  schedule:
    # Safety-net only. Delete this whole `schedule:` block once cron-job.org is
    # verified if you want zero duplicate scans. ~16:00 UTC keeps it clear of the
    # cron-job.org morning run; it can fire late without mislabeling (see below).
    - cron: '0 16 * * 1-5'     # backstop -> morning full scan (+ heartbeat)
  workflow_dispatch:           # manual button + cron-job.org entry point
    inputs:
      mode:
        description: 'morning or intraday'
        default: morning
        type: choice
        options: [morning, intraday]

permissions:
  contents: write              # allow committing the report back

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Determine mode
        id: m
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.mode }}"
          else
            # The only native schedule left is the morning safety-net cron; the
            # precise 3x/day runs arrive via workflow_dispatch (cron-job.org passes
            # mode explicitly above). Any native cron trigger => morning full scan,
            # which is delay-proof: a late fire still does the right thing.
            MODE="morning"
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "Running mode: $MODE (event=${{ github.event_name }}, cron='${{ github.event.schedule }}')"

      - name: Generate report
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python report.py --mode ${{ steps.m.outputs.mode }}

      - name: Alert on ACTION + publish report
        env:
          MODE: ${{ steps.m.outputs.mode }}
        run: |
          python - <<'PY'
          import json, glob, os, shutil, subprocess
          mode = os.environ['MODE']
          jf = sorted(glob.glob(f'logs/report_*_{mode}.json'))
          if not jf:
              raise SystemExit('ERROR: report produced no JSON output')
          d = json.load(open(jf[-1]))
          action = d.get('action', '')
          setups = d.get('swing_setups', [])
          if action.startswith('ACTION'):
              tickers = ', '.join(s['symbol'] for s in setups[:10])
              title = f'Stock Autopilot {mode}: ACTION'
              msg = f'{len(setups)} swing setups: {tickers}. Open Claude app -> "read the latest report" to review/approve.'
              priority = 'high'
          elif action == 'DATA ERROR':
              title = f'Stock Autopilot {mode}: DATA ERROR'
              msg = 'Scan failed to fetch data - report is INVALID, do not trade.'
              priority = 'high'
          else:
              # Daily heartbeat: ping even on a NO-ACTION day so that *silence*
              # always means the job didn't run (broken), never "quietly fine".
              title = f'Stock Autopilot {mode}: no trades'
              msg = f'Report ran OK, {len(setups)} swing setups - nothing to do today. (heartbeat)'
              priority = 'low'
          # always alert; priority distinguishes act-now from heartbeat
          subprocess.run(['curl', '-s', '-H', f'Title: {title}', '-H', f'Priority: {priority}',
                          '-d', msg, 'https://ntfy.sh/stk-ap-rb-9k4m7q2x'], check=False)
          print(f'alert sent ({priority}): {title}')
          # publish the human-readable report to a stable path for the phone session
          md = sorted(glob.glob(f'logs/report_*_{mode}.md'))[-1]
          shutil.copy(md, f'latest_{mode}.md')
          PY

      - name: Commit the published report
        run: |
          git config user.name 'stock-autopilot-bot'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add "latest_${{ steps.m.outputs.mode }}.md"
          git commit -m "report: ${{ steps.m.outputs.mode }} $(date -u +%Y-%m-%dT%H:%MZ)" || echo "no change to commit"
          git push
